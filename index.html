<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>تولدت مبارک عدنان</title>
  <style>
    :root {
      --bg1: #120f2f;
      --bg2: #1d1450;
      --bg3: #2b1f74;
      --pink: #ff4da6;
      --blue: #56ccf2;
      --yellow: #ffd166;
      --white: #ffffff;
      --text: #f5f7ff;
      --muted: #d7dcf8;
      --glass: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.18);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      font-family: Tahoma, Arial, sans-serif;
      color: var(--text);
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(255, 77, 166, 0.22), transparent 24%),
        radial-gradient(circle at top left, rgba(86, 204, 242, 0.20), transparent 28%),
        radial-gradient(circle at bottom center, rgba(255, 209, 102, 0.18), transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .back-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .back-glow::before,
    .back-glow::after {
      content: "";
      position: absolute;
      width: 45vw;
      height: 45vw;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      animation: floatGlow 8s ease-in-out infinite alternate;
    }

    .back-glow::before {
      top: -10%;
      right: -10%;
      background: rgba(255, 77, 166, 0.45);
    }

    .back-glow::after {
      bottom: -10%;
      left: -10%;
      background: rgba(86, 204, 242, 0.35);
      animation-duration: 10s;
    }

    @keyframes floatGlow {
      from {
        transform: translateY(0) scale(1);
      }
      to {
        transform: translateY(30px) scale(1.08);
      }
    }

    .confetti-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .confetti-bg span {
      position: absolute;
      width: 10px;
      height: 18px;
      border-radius: 999px;
      opacity: 0.85;
      animation: fall linear infinite;
    }

    @keyframes fall {
      from {
        transform: translateY(-120px) rotate(0deg);
      }
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    .balloon {
      position: absolute;
      bottom: -140px;
      width: 54px;
      height: 68px;
      border-radius: 50% 50% 45% 45%;
      opacity: 0.9;
      animation: rise linear infinite;
      box-shadow: inset -6px -10px 18px rgba(0, 0, 0, 0.16);
    }

    .balloon::after {
      content: "";
      position: absolute;
      top: 66px;
      left: 26px;
      width: 2px;
      height: 80px;
      background: rgba(255, 255, 255, 0.4);
    }

    @keyframes rise {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-125vh);
      }
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(10, 8, 30, 0.72);
      backdrop-filter: blur(8px);
      transition: 0.8s ease;
    }

    .overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .welcome-box {
      width: min(100%, 430px);
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: var(--shadow);
      border-radius: 28px;
      padding: 28px 22px;
      text-align: center;
      backdrop-filter: blur(14px);
    }

    .badge {
      width: 82px;
      height: 82px;
      margin: 0 auto 16px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      background: linear-gradient(135deg, var(--yellow), #ff9f43);
      box-shadow: 0 10px 30px rgba(255, 209, 102, 0.35);
    }

    .welcome-box h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 7vw, 42px);
      line-height: 1.2;
    }

    .welcome-box p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.9;
      font-size: 15px;
    }

    .start-btn,
    .music-btn,
    .replay-btn {
      border: 0;
      cursor: pointer;
      color: #1d1450;
      font-weight: 700;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 15px;
      background: linear-gradient(135deg, var(--yellow), #ff8fab);
      box-shadow: 0 12px 28px rgba(255, 143, 171, 0.30);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .start-btn:active,
    .music-btn:active,
    .replay-btn:active {
      transform: scale(0.97);
    }

    .music-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 25;
      padding: 12px 16px;
      font-size: 14px;
    }

    .card-wrap {
      position: relative;
      z-index: 10;
      width: min(100%, 760px);
      opacity: 0;
      transform: translateY(30px) scale(0.96);
      transition: 0.9s ease;
      pointer-events: none;
    }

    .card-wrap.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 32px;
      padding: 22px;
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      max-height: calc(100dvh - 32px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.10), transparent);
      transform: translateX(-100%);
      animation: shine 5s linear infinite;
      pointer-events: none;
    }

    @keyframes shine {
      to {
        transform: translateX(100%);
      }
    }

    .top {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: nowrap;
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    .avatar-wrapper {
      position: relative;
      flex: 0 0 auto;
    }

    .avatar-img-container {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, var(--pink), var(--blue), var(--yellow));
      box-shadow: 0 8px 24px rgba(255, 77, 166, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
      animation: pulseGlow 3s infinite alternate;
    }

    .avatar-img-container:hover {
      transform: scale(1.08) rotate(3deg);
      box-shadow: 0 12px 30px rgba(86, 204, 242, 0.6);
    }

    .avatar-img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid rgba(18, 15, 47, 0.8);
      background-color: var(--bg2);
    }

    .avatar-badge {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--yellow), #ff9f1c);
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    @keyframes pulseGlow {
      0% {
        box-shadow: 0 8px 20px rgba(255, 77, 166, 0.4);
      }
      100% {
        box-shadow: 0 8px 30px rgba(86, 204, 242, 0.6);
      }
    }

    .title-box {
      flex: 1;
      min-width: 0;
    }

    .mini-tag {
      display: inline-block;
      margin-bottom: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: #fff7d1;
      background: rgba(255, 209, 102, 0.16);
      border: 1px solid rgba(255, 209, 102, 0.24);
      white-space: nowrap;
    }

    .title-box h2 {
      margin: 0;
      line-height: 1.25;
      font-size: clamp(20px, 5.5vw, 44px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title-box h2 span {
      background: linear-gradient(135deg, #ffffff, #ffd166, #ff8fab);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .message {
      margin-top: 14px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      line-height: 1.95;
      font-size: 15px;
      color: var(--text);
      flex: 1;
      min-height: 120px;
      max-height: 250px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .message::-webkit-scrollbar {
      width: 5px;
    }
    .message::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
    }
    .message::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
    }

    .cursor {
      display: inline-block;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 49% {
        opacity: 1;
      }
      50%, 100% {
        opacity: 0;
      }
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 18px;
      flex-shrink: 0;
    }

    .stat {
      border-radius: 18px;
      padding: 12px 10px;
      text-align: center;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    .stat strong {
      display: block;
      margin-bottom: 6px;
      color: var(--yellow);
      font-size: 16px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .footer {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .sign {
      color: var(--muted);
      font-size: 14px;
    }

    .sign b {
      color: #ffd166;
    }

    .spark {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff, rgba(255, 209, 102, 0.8), transparent 70%);
      pointer-events: none;
      animation: boom 0.8s ease-out forwards;
      z-index: 50;
    }

    @keyframes boom {
      from {
        transform: translate(-50%, -50%) scale(0.2);
        opacity: 1;
      }
      to {
        transform: translate(-50%, -50%) scale(8);
        opacity: 0;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .card-wrap {
        max-height: calc(100dvh - 20px);
      }

      .card {
        padding: 16px;
        border-radius: 24px;
        max-height: calc(100dvh - 30px);
      }

      .top {
        margin-bottom: 12px;
        gap: 12px;
      }

      .avatar-img-container {
        width: 76px;
        height: 76px;
        padding: 3px;
      }

      .avatar-badge {
        width: 26px;
        height: 26px;
        font-size: 13px;
      }

      .mini-tag {
        font-size: 10px;
        padding: 4px 8px;
        margin-bottom: 4px;
      }

      .welcome-box {
        padding: 22px 16px;
      }

      .message {
        font-size: 14px;
        line-height: 1.8;
        padding: 14px;
        max-height: 25dvh;
        min-height: 100px;
      }

      .stats {
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin-top: 12px;
      }

      .stat {
        padding: 8px 6px;
        border-radius: 12px;
      }

      .stat strong {
        font-size: 13px;
        margin-bottom: 2px;
      }

      .stat span {
        font-size: 10px;
        line-height: 1.4;
      }

      .music-btn {
        top: 10px;
        left: 10px;
        font-size: 12px;
        padding: 10px 12px;
      }

      .footer {
        margin-top: 12px;
      }

      .start-btn,
      .replay-btn {
        padding: 10px 18px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="back-glow"></div>

  <div class="confetti-bg" id="confettiBg"></div>
  <div id="balloons"></div>

  <audio id="birthdayAudio" preload="auto" loop>
    <source src="birthday.mp3" type="audio/mpeg" />
  </audio>

  <button class="music-btn" id="musicBtn">♪ پخش آهنگ</button>

  <div class="overlay" id="overlay">
    <div class="welcome-box">
      <div class="badge">🎉</div>
      <h1>سورپرایز تولد<br>برای عدنان</h1>
      <p>
        یه صفحه خاص، شاد، متفاوت و فقط مخصوص کسی که رفاقتش ارزشمنده.
      </p>
      <button class="start-btn" id="startBtn">بازش کن</button>
    </div>
  </div>

  <div class="card-wrap" id="cardWrap">
    <div class="card" id="card">
      <div class="top">
        <div class="avatar-wrapper">
          <div class="avatar-img-container">
            <img src="1.jpg" alt="عدنان" onerror="this.src='https://via.placeholder.com/150?text=Adnan'" />
          </div>
          <div class="avatar-badge">🎂</div>
        </div>
        <div class="title-box">
          <div class="mini-tag">ویژه رفیق ناب و باارزش</div>
          <h2>تولدت مبارک <span>عدنان</span></h2>
        </div>
      </div>

      <div class="message" id="message"></div>

      <div class="stats">
        <div class="stat">
          <strong>حال خوب</strong>
          <span>برای شروع پرانرژی روزها</span>
        </div>
        <div class="stat">
          <strong>موفقیت</strong>
          <span>رسیدن به اهدافی که حقته</span>
        </div>
        <div class="stat">
          <strong>رفاقت</strong>
          <span>به خاطر رفاقت‌های ارزشمند</span>
        </div>
      </div>

      <div class="footer">
        <div class="sign"> از طرف <b>رضا</b></div>
        <button class="replay-btn" id="replayBtn">دوباره</button>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const cardWrap = document.getElementById("cardWrap");
    const messageBox = document.getElementById("message");
    const replayBtn = document.getElementById("replayBtn");
    const musicBtn = document.getElementById("musicBtn");
    const audio = document.getElementById("birthdayAudio");
    const confettiBg = document.getElementById("confettiBg");
    const balloons = document.getElementById("balloons");
    const card = document.getElementById("card");

    const text =
      "عدنان عزیز، تولدت مبارک. " +
      "امروز فقط روز اضافه شدن یک عدد به سن تو نیست؛ " +
      "روز جشن گرفتن حضور آدمیه که بودنش ارزش داره. " +
      "تو از اون رفیق‌هایی هستی که کنارش، لحظه‌ها قشنگ‌تر می‌شن، " +
      "خنده‌ها واقعی‌تر می‌شن و خاطره‌ها موندگارتر. " +
      "امیدوارم سال جدید زندگی‌ات پر از اتفاق‌های خفن، موفقیت‌های بزرگ، " +
      "دل خوش، آرامش، پول خوب و مسیرهای روشن باشه. " +
      "آرزو می‌کنم هر چیزی که ته دلت می‌خوای، با قدرت و عزت بهش برسی " +
      "و همیشه همون‌قدر بدرخشی که لیاقتش رو داری. " +
      "تولدت مبارک رفیق، بهترین‌ها حق توئه.";

    let isPlaying = false;

    function createConfetti() {
      const colors = ["#ff4da6", "#56ccf2", "#ffd166", "#ffffff", "#bb6bd9"];
      for (let i = 0; i < 28; i++) {
        const el = document.createElement("span");
        el.style.left = Math.random() * 100 + "vw";
        el.style.top = -Math.random() * 40 + "px";
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDuration = 6 + Math.random() * 6 + "s";
        el.style.animationDelay = Math.random() * 3 + "s";
        confettiBg.appendChild(el);
      }
    }

    function createBalloons() {
      const colors = [
        "linear-gradient(135deg,#ff4da6,#ff8fab)",
        "linear-gradient(135deg,#56ccf2,#2f80ed)",
        "linear-gradient(135deg,#ffd166,#ff9f1c)",
        "linear-gradient(135deg,#bb6bd9,#8e54e9)"
      ];

      for (let i = 0; i < 8; i++) {
        const balloon = document.createElement("div");
        balloon.className = "balloon";
        balloon.style.left = Math.random() * 100 + "vw";
        balloon.style.animationDuration = 10 + Math.random() * 8 + "s";
        balloon.style.animationDelay = Math.random() * 6 + "s";
        balloon.style.background = colors[Math.floor(Math.random() * colors.length)];
        balloons.appendChild(balloon);
      }
    }

    function typeText(content) {
      messageBox.innerHTML = "";
      let i = 0;

      function step() {
        if (i <= content.length) {
          messageBox.innerHTML = content.slice(0, i) + '<span class="cursor">|</span>';
          i++;
          setTimeout(step, 30);
        } else {
          messageBox.textContent = content;
        }
      }

      step();
    }

    function burst(x, y, count) {
      for (let i = 0; i < count; i++) {
        const s = document.createElement("div");
        s.className = "spark";
        s.style.left = x + (Math.random() * 80 - 40) + "px";
        s.style.top = y + (Math.random() * 80 - 40) + "px";
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 800);
      }
    }

    function playMusic() {
      audio.play().then(() => {
        isPlaying = true;
        musicBtn.textContent = "❚❚ توقف آهنگ";
      }).catch(() => {
        musicBtn.textContent = "آهنگ اجرا نشد";
      });
    }

    function stopMusic() {
      audio.pause();
      isPlaying = false;
      musicBtn.textContent = "♪ پخش آهنگ";
    }

    musicBtn.addEventListener("click", () => {
      if (isPlaying) {
        stopMusic();
      } else {
        playMusic();
      }
    });

    startBtn.addEventListener("click", () => {
      overlay.classList.add("hidden");
      cardWrap.classList.add("show");
      typeText(text);
      playMusic();
      burst(window.innerWidth / 2, window.innerHeight / 2, 30);
    });

    replayBtn.addEventListener("click", () => {
      typeText(text);
      audio.currentTime = 0;
      playMusic();
      burst(window.innerWidth / 2, window.innerHeight / 2, 24);
    });

    document.addEventListener("mousemove", (e) => {
      const x = (window.innerWidth / 2 - e.clientX) / 35;
      const y = (window.innerHeight / 2 - e.clientY) / 35;
      card.style.transform = "rotateY(" + x + "deg) rotateX(" + (-y) + "deg)";
    });

    document.addEventListener("touchmove", (e) => {
      if (!e.touches[0]) return;
      const touch = e.touches[0];
      const x = (window.innerWidth / 2 - touch.clientX) / 45;
      const y = (window.innerHeight / 2 - touch.clientY) / 45;
      card.style.transform = "rotateY(" + x + "deg) rotateX(" + (-y) + "deg)";
    }, { passive: true });

    document.addEventListener("mouseleave", () => {
      card.style.transform = "rotateY(0deg) rotateX(0deg)";
    });

    document.addEventListener("click", (e) => {
      burst(e.clientX, e.clientY, 8);
    });

    createConfetti();
    createBalloons();
  </script>
</body>
</html>
